bot:
  mode: DEMO
  cycle_interval_minutes: 10
  max_concurrent_positions: 5
  demo_capital: 1000.0
  max_trades_per_cycle: 3

risk:
  max_position_pct: 0.05
  max_total_exposure_pct: 0.20
  stop_loss_pct: 0.40
  take_profit_partial_pct: 0.80
  take_profit_sell_fraction: 0.50
  min_ev_threshold: 0.02
  min_liquidity_usdc: 5000
  min_volume_24h: 10000
  kelly_fraction: 0.25

strategies:
  bonding:
    enabled: true
    min_price: 0.80
    max_price: 0.97
    min_annualized_return: 0.15
    max_days_to_resolution: 90
  value_betting:
    enabled: true
    min_price: 0.10
    max_price: 0.90
    min_volume_24h: 20000
    min_liquidity: 10000
  momentum:
    enabled: true
    min_volume_24h: 50000
    min_price: 0.15
    max_price: 0.85

apis:
  gamma_base: "https://gamma-api.polymarket.com"
  clob_base: "https://clob.polymarket.com"
  cycle_delay_seconds: 0.5

claude:
  model: "claude-sonnet-4-20250514"
  max_tokens: 4096
  temperature: 0.3

memory:
  history_context_size: 20
  analysis_after_close: true
  rule_extraction_every_n_cycles: 20
  parameter_adjustment_every_n_cycles: 20
  min_trades_for_adjustments: 20
  max_active_rules: 15

dashboard:
  host: "0.0.0.0"
  port: 5000
  refresh_interval_seconds: 60

database:
  path: "data/bot.db"

logging:
  level: "INFO"
  log_dir: "logs"
